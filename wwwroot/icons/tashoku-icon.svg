<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="48" ry="48" fill="#FFFFFF" stroke="#1F2937" stroke-width="8" />

  <!-- 3x3 grid: two vertical and two horizontal divider lines -->
  <!-- Positions at 1/3 and 2/3 of 512 = 170.6667 and 341.3333 -->
  <g stroke="#1F2937" stroke-width="22" stroke-linecap="square" fill="none">
	<!-- Vertical dividers -->
	<line x1="170.6667" y1="48" x2="170.6667" y2="464" />
	<line x1="341.3333" y1="48" x2="341.3333" y2="464" />
	<!-- Horizontal dividers -->
	<line x1="48" y1="170.6667" x2="464" y2="170.6667" />
	<line x1="48" y1="341.3333" x2="464" y2="341.3333" />
  </g>

  <!-- Optional thin inner separators for crisp small sizes -->
  <g stroke="#111827" stroke-width="2" fill="none" opacity="0.08">
	<line x1="48" y1="48" x2="464" y2="48" />
	<line x1="48" y1="464" x2="464" y2="464" />
  </g>

  <!-- Colored dots centered in each 3x3 cell. Group uses inset translate for clarity -->
  <g id="dots" transform="translate(48,48)">
	<!-- cellSize = 416 / 3 = 138.6666667; center offset = 138.6666667 / 2 = 69.3333333 -->
	<!-- centers (relative to group): 69.3333, 208.0, 346.6667 -->
	<g fill="none">
	  <!-- Row 1 -->
	  <circle cx="69.3333"  cy="69.3333"  r="35" fill="#E53E3E" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="208.0"    cy="69.3333"  r="35" fill="#38A169" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="346.6667" cy="69.3333"  r="35" fill="#3182CE" stroke="#FFFFFF" stroke-width="4" />
	  <!-- Row 2 -->
	  <circle cx="69.3333"  cy="208.0"    r="35" fill="#D69E2E" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="208.0"    cy="208.0"    r="35" fill="#805AD5" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="346.6667" cy="208.0"    r="35" fill="#0BC5EA" stroke="#FFFFFF" stroke-width="4" />
	  <!-- Row 3 -->
	  <circle cx="69.3333"  cy="346.6667" r="35" fill="#F97316" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="208.0"    cy="346.6667" r="35" fill="#EC4899" stroke="#FFFFFF" stroke-width="4" />
	  <circle cx="346.6667" cy="346.6667" r="35" fill="#84CC16" stroke="#FFFFFF" stroke-width="4" />
	</g>
  </g>
</svg>
