<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" rx="40" ry="40" fill="#FFFFFF" />
  <!-- 3x3 grid of cells; draw nine circular pegs centered in each cell -->
  <g transform="translate(32,32)">
	<!-- cell size 448 / 3 = 149.333; use 149 spacing with padding -->
	<defs>
	  <style>
		.dot { r: 24; }
	  </style>
	</defs>
	<!-- Colors (match CSS variables used in the app) -->
	<!-- --c0: #E53E3E; --c1: #38A169; --c2: #3182CE; --c3: #D69E2E; --c4: #805AD5; --c5: #0BC5EA; --c6: #F97316; --c7: #EC4899; --c8: #84CC16 -->
	<g id="dots">
	  <!-- Row 1 -->
	  <circle cx="74" cy="74" r="30" fill="#E53E3E" />
	  <circle cx="224" cy="74" r="30" fill="#38A169" />
	  <circle cx="374" cy="74" r="30" fill="#3182CE" />
	  <!-- Row 2 -->
	  <circle cx="74" cy="224" r="30" fill="#D69E2E" />
	  <circle cx="224" cy="224" r="30" fill="#805AD5" />
	  <circle cx="374" cy="224" r="30" fill="#0BC5EA" />
	  <!-- Row 3 -->
	  <circle cx="74" cy="374" r="30" fill="#F97316" />
	  <circle cx="224" cy="374" r="30" fill="#EC4899" />
	  <circle cx="374" cy="374" r="30" fill="#84CC16" />
	</g>
  </g>
</svg>
